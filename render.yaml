# ============================================================
#  Render Blueprint — MCP WebScraper
#  Push this repo to GitHub, then deploy on Render.
#  Render auto-detects this file and configures everything.
# ============================================================

services:
  - type: web
    name: mcp-webscraper
    runtime: docker
    plan: starter         # $7/mo — or use 'free' for testing
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MCP_TRANSPORT
        value: sse
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: "8000"
    healthCheckPath: /sse
